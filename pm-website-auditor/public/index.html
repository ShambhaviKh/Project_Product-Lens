<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PM Audit Terminal — paste a link, get the product read</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="grain"></div>

  <header class="topbar">
    <span class="eyebrow">// PM AUDIT TERMINAL</span>
    <span class="topbar-status" id="statusPill">idle</span>
  </header>

  <main>
    <section class="hero">
      <h1>Paste a link.<br>Get the PM read.</h1>
      <p class="hero-sub">One URL in. A full product audit out — what's working, what to fix, and the whole user journey, seen through a product manager's eyes.</p>

      <form id="auditForm" class="url-bar" autocomplete="off">
        <span class="url-bar-prompt">$</span>
        <input
          id="urlInput"
          type="text"
          inputmode="url"
          placeholder="e.g. stripe.com or https://your-product.com"
          required
        />
        <button type="submit" id="submitBtn">Run audit</button>
      </form>
      <div class="hint" id="hint">Runs a live fetch of the page's HTML — no login-gated or JS-only pages.</div>
    </section>

    <section id="loading" class="loading hidden">
      <div class="term-window">
        <div class="term-dots"><span></span><span></span><span></span></div>
        <div class="term-lines" id="termLines"></div>
      </div>
    </section>

    <section id="errorBox" class="error-box hidden"></section>

    <section id="report" class="report hidden"></section>
  </main>

  <footer class="page-footer">
    <span>Built for product people.</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
